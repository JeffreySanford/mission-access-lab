server:
  port: 8080
spring:
  application:
    name: authorization-wrapper
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mission_access}
    username: ${DB_USER:mission}
    password: ${DB_PASSWORD:mission}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.default_schema: authorization_wrapper
  flyway:
    enabled: true
    schemas: [authorization_wrapper]
    default-schema: authorization_wrapper
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8081/realms/mission-access}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
app:
  security:
    # Intentionally off by default: this is a ReBAC/OpenFGA demo lab, and leaving JWT
    # auth off keeps the diagnostics/playground UI and E2E suite frictionless without
    # wiring Keycloak token issuance into the frontend. Set SECURITY_ENABLED=true (and
    # supply a bearer token) to exercise the real oauth2ResourceServer JWT path — the
    # controller/service layer already enforces it correctly when enabled.
    enabled: ${SECURITY_ENABLED:false}
  openfga:
    base-url: ${OPENFGA_BASE_URL:http://localhost:8082}
    store-id: ${OPENFGA_STORE_ID:}
    model-id: ${OPENFGA_MODEL_ID:}
    request-timeout: 2s
