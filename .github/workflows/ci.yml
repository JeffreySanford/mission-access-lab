name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install JavaScript dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify workspace structure
        run: pnpm verify

      - name: Lint Angular portal
        run: pnpm exec nx lint access-portal

      - name: Test Angular portal
        run: pnpm exec nx test access-portal --watch=false --browsers=ChromeHeadless

      - name: Test Spring Boot wrapper
        working-directory: apps/authorization-wrapper
        run: ./gradlew test

      - name: Build Angular portal
        run: pnpm exec nx build access-portal
